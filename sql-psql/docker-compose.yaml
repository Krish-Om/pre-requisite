services:
  database:
    image: postgres:17-alpine
    container_name: postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mysecret
      - POSTGRES_DB=mydb
    ports:
      - "5432:5432"


volumes:
  db_data:
    driver: local
networks:
  pg_network:
    driver: bridge
